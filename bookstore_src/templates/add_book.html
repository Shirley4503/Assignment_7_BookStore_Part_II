{% extends 'base.html' %}

{% block container %}

<div class="formCard">
    <h2 class="formTitle">Add a New Book</h2>

    <form method="POST">
        <label>Title:</label><br>
        <input type="text" name="title" required class="formInput"><br><br>

        <label>Author:</label><br>
        <input type="text" name="author" required class="formInput"><br><br>

        <label>ISBN:</label><br>
        <input type="text" name="isbn" required class="formInput"><br><br>

        <label>Price:</label><br>
        <input type="number" step="0.01" name="price" required class="formInput"><br><br>

        <label>Image filename:</label><br>
        <input type="text" name="image" placeholder="example.jpg" required class="formInput"><br><br>

        <label>Category:</label><br>
        <select name="categoryId" required class="formSelect">
            {% for cat in categories %}
                <option value="{{ cat.categoryId }}">{{ cat.categoryName }}</option>
            {% endfor %}
        </select><br><br>

        <button type="submit" class="submitMainButton">
            Add Book
        </button>
    </form>
</div>

{% endblock %}
